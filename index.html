<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNTAgMTI1Ij48cmVjdCB4PSIwIiB5PSIyNSIgd2lkdGg9IjUwIiBoZWlnaHQ9IjUwIiBmaWxsPSIjZmY0NTAwIi8+PHJlY3QgeD0iNTAiIHk9IjI1IiB3aWR0aD0iNTAiIGhlaWdodD0iNTAiIGZpbGw9IiNmZjQ1MDAiLz48cmVjdCB4PSI1MCIgeT0iNzUiIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgZmlsbD0iI2ZmNDUwMCIvPjxyZWN0IHg9IjEwMCIgeT0iNzUiIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgZmlsbD0iI2ZmNDUwMCIvPjx0ZXh0IHg9Ijc1IiB5PSI3MCIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjYwIiBmaWxsPSJ3aGl0ZSIgZm9udC13ZWlnaHQ9ImJvbGQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPlI8L3RleHQ+PC9zdmc+">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --bg-color: #f0f0f0; --accent-orange: #ff4500; --text-main: #1a1a1a; }
        body { background-color: var(--bg-color); font-family: sans-serif; margin: 0; padding: 2rem; }
        header { border-bottom: 1px solid var(--text-main); margin-bottom: 2rem; }
        footer { margin-top: 40px; border-top: 1px solid var(--text-main); padding-top: 20px; font-family: Arial, sans-serif; font-size: 0.8rem; }
        
        .workspace-grid { display: grid; grid-template-columns: 300px 1fr 1fr; gap: 20px; height: 70vh; }
        .controls { background: white; padding: 20px; border: 1px solid #ccc; overflow-y: auto; }
        
        .view-port { position: relative; border: 1px solid #ccc; background: #fafafa; overflow: hidden; }
        
        #canvas-2d { background-color: #fafafa; }
        
        .room-box {
            position: absolute; border: 2px solid var(--text-main); padding: 10px; cursor: grab;
            display: flex; flex-direction: column; resize: both; overflow: auto; min-width: 60px; min-height: 60px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1); user-select: none; z-index: 10;
            font-weight: bold; text-transform: uppercase; font-size: 10px; background-color: white;
        }
        .room-box.selected { border-color: blue; box-shadow: 0 0 10px blue; }
        .dims { font-size: 0.75rem; color: #333; font-family: Arial, sans-serif; font-weight: normal; text-transform: none; margin-top: 5px; }
        .delete-btn { cursor: pointer; color: #cc0000; float: right; }
        
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 0.8rem; }
        .swatch { width: 15px; height: 15px; margin-right: 10px; border: 1px solid #000; }
        .line { stroke: var(--accent-orange); stroke-width: 3; stroke-dasharray: 6; pointer-events: none; }
    </style>
</head>
<body>

    <header><h1>RESEARCH DESK</h1></header>

    <div class="workspace-grid">
        <div class="controls">
            <h3>Configuration</h3>
            <label><input type="checkbox" id="snapToggle" checked> Snap to Grid</label><br>
            <label><input type="checkbox" id="showGrid" onchange="renderGrid()" checked> Show Custom Grid</label>

            <h3 style="margin-top:20px;">Legend</h3>
            <div id="legend"></div>

            <h3 style="margin-top:20px;">Program</h3>
            <select id="rName" onchange="toggleCustom()" style="width: 100%; margin-bottom: 10px;">
                <option value="Living">Living</option><option value="Kitchen">Kitchen</option>
                <option value="Bathroom">Bathroom</option><option value="Circulation">Circulation</option>
                <option value="Custom">Custom Room</option>
            </select>
            <input type="text" id="customName" placeholder="Enter room name" style="display:none; width:95%; margin-bottom:10px;">
            <select id="rSqm" style="width: 100%; margin-bottom: 10px;">
                <option value="10">10sqm</option><option value="50">50sqm</option><option value="100">100sqm</option>
            </select>
            <button onclick="addRoom()" style="background:var(--accent-orange); color:white; width:100%; border:none; padding:10px;">ADD ROOM</button>

            <h3 style="margin-top:20px;">Utilities</h3>
            <button onclick="exportToDXF()" style="background:var(--text-main); color:white; width:100%; border:none; padding:10px;">EXPORT TO DXF</button>
        </div>

        <div id="canvas-2d" class="view-port">
            <svg id="grid-svg" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>
            <svg id="svgLayer" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>
        </div>
        <div id="canvas-3d" class="view-port"></div>
    </div>

    <footer>
        <p>&copy; 2026 RESEARCH DESK. All rights reserved. | Contact: hello@researchdesk.com</p>
    </footer>

    <script>
        let rooms = [];
        let adjacencies = [];
        let selectedId = null;
        let scene, camera, renderer;
        const scale = 15; // 1m = 15px

        function renderGrid() {
            const svg = document.getElementById('grid-svg');
            svg.innerHTML = '';
            if(!document.getElementById('showGrid').checked) return;

            const width = document.getElementById('canvas-2d').clientWidth;
            const height = document.getElementById('canvas-2d').clientHeight;
            
            // Repeating Pattern: 1.2m, 2.4m, 1.2m, 2.4m...
            let pos = 0;
            let step = 1.2;
            
            while(pos < Math.max(width, height)) {
                let px = pos * scale;
                // Vertical Lines
                svg.innerHTML += `<line x1="${px}" y1="0" x2="${px}" y2="100%" stroke="#ddd" stroke-width="1"/>`;
                // Horizontal Lines
                svg.innerHTML += `<line x1="0" y1="${px}" x2="100%" y2="${px}" stroke="#ddd" stroke-width="1"/>`;
                
                pos += step;
                step = (step === 1.2) ? 2.4 : 1.2; // Toggle pattern
            }
        }

        function toggleCustom() { document.getElementById('customName').style.display = (document.getElementById('rName').value === 'Custom') ? 'block' : 'none'; }

        // ... (standard setup: scene init, room logic, dxf logic)
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xfafafa);
            camera = new THREE.OrthographicCamera(-20, 20, 20, -20, 0.1, 1000);
            camera.position.set(20, 20, 20);
            camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            const container = document.getElementById('canvas-3d');
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            animate();
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

        function render3D() {
            scene.children.filter(c => c.type === 'Mesh').forEach(c => scene.remove(c));
            rooms.forEach(r => {
                const el = document.getElementById(r.id);
                const geom = new THREE.BoxGeometry(el.offsetWidth/15, r.h, el.offsetHeight/15);
                const mat = new THREE.MeshLambertMaterial({ color: 0xFFCC00 });
                const cube = new THREE.Mesh(geom, mat);
                const edges = new THREE.EdgesGeometry(geom);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                cube.add(line);
                cube.position.set((el.offsetLeft - 300)/15, r.h/2, (el.offsetTop - 50)/15);
                scene.add(cube);
            });
        }

        function startDrag(e) {
            let el = e.target.closest('.room-box');
            let shiftX = e.clientX - el.getBoundingClientRect().left;
            let shiftY = e.clientY - el.getBoundingClientRect().top;
            let snap = document.getElementById('snapToggle').checked;
            
            function move(e) {
                let left = e.clientX - shiftX - document.getElementById('canvas-2d').getBoundingClientRect().left;
                let top = e.clientY - shiftY - document.getElementById('canvas-2d').getBoundingClientRect().top;
                
                if(snap) {
                    left = Math.round(left / (1.2 * scale)) * (1.2 * scale);
                    top = Math.round(top / (1.2 * scale)) * (1.2 * scale);
                }
                
                el.style.left = left + 'px';
                el.style.top = top + 'px';
                render3D();
            }
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', () => document.removeEventListener('mousemove', move));
        }

        function addRoom() {
            const id = 'room-' + Date.now();
            const box = document.createElement('div');
            box.className = 'room-box'; box.id = id;
            box.style.width = '60px'; box.style.height = '60px';
            box.style.left = '50px'; box.style.top = '50px';
            box.innerHTML = `<div>New Room <span class="delete-btn" onclick="deleteRoom('${id}')">X</span></div>`;
            box.onmousedown = startDrag;
            document.getElementById('canvas-2d').appendChild(box);
            rooms.push({ id, h: 3 });
            render3D();
        }

        function deleteRoom(id) { document.getElementById(id).remove(); rooms = rooms.filter(r => r.id !== id); render3D(); }

        init3D();
        renderGrid();
    </script>
</body>
</html>
