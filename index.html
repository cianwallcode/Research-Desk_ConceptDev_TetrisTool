<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RESEARCH DESK</title>
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB4PSIwIiB5PSIyNSIgd2lkdGg9IjUwIiBoZWlnaHQ9IjUwIiBmaWxsPSIjZmY0NTAwIi8+PHJlY3QgeD0iNTAiIHk9IjI1IiB3aWR0aD0iNTAiIGhlaWdodD0iNTAiIGZpbGw9IiNmZjQ1MDAiLz48cmVjdCB4PSI1MCIgeT0iNzUiIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgZmlsbD0iI2ZmNDUwMCIvPjxyZWN0IHg9IjEwMCIgeT0iNzUiIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgZmlsbD0iI2ZmNDUwMCIvPjwvc3ZnPg==">
    <style>
        :root {
            --bg-color: #f0f0f0; --grid-color: #d1d1d1; --accent-orange: #ff4500;
            --text-main: #1a1a1a; --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Inter', Helvetica, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                              linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: var(--font-serif);
            color: var(--text-main);
            margin: 0; padding: 2rem;
        }

        header { border-bottom: 1px solid var(--text-main); margin-bottom: 2rem; }
        .workspace-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .controls { background: white; padding: 20px; border: 1px solid #ccc; height: fit-content; }
        .canvas-area { height: 80vh; position: relative; border: 1px dashed var(--text-main); background: #fafafa; overflow: hidden; }
        
        .room-box {
            position: absolute; border: 2px solid var(--text-main);
            padding: 10px; cursor: grab; display: flex; flex-direction: column;
            resize: both; overflow: auto; min-width: 60px; min-height: 60px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            user-select: none; z-index: 10;
        }
        .room-box:active { cursor: grabbing; box-shadow: 8px 8px 0px rgba(0,0,0,0.2); }
        .dims { font-size: 0.75rem; color: #666; font-family: var(--font-sans); }
        .line { stroke: var(--accent-orange); stroke-width: 3; stroke-dasharray: 6; pointer-events: none; }
    </style>
</head>
<body>

    <header><h1>RESEARCH DESK</h1></header>

    <div class="workspace-grid">
        <div class="controls">
            <h3>Program (Meters)</h3>
            <label>Room Type:</label><br>
            <select id="rName" style="width: 100%; margin-bottom: 10px;">
                <option value="Kitchen">Kitchen</option><option value="Living">Living</option>
                <option value="Dining">Dining</option><option value="Bedroom">Bedroom</option>
                <option value="Bathroom">Bathroom</option><option value="Hallway">Hallway</option>
                <option value="Office">Office</option>
            </select><br>
            <label>Area (sqm):</label><br>
            <select id="rSqm" style="width: 100%; margin-bottom: 10px;">
                <option value="10">10</option><option value="20">20</option><option value="30">30</option>
                <option value="40">40</option><option value="50">50</option><option value="60">60</option>
                <option value="70">70</option><option value="80">80</option><option value="90">90</option>
                <option value="100">100</option>
            </select>
            <button onclick="addRoom()" style="background:var(--accent-orange); color:white; border:none; padding:10px; width:100%; cursor:pointer;">Generate Box</button>

            <h3 style="margin-top:40px;">Adjacency</h3>
            <select id="roomA" style="width:100%"></select> <span>near</span>
            <select id="roomB" style="width:100%"></select>
            <button onclick="addAdjacency()" style="margin-top:10px; display:block; width:100%;">Connect</button>
        </div>

        <div id="canvas" class="canvas-area">
            <svg id="svgLayer" style="position:absolute; top:0; left:0; width:100%; height:100%;"></svg>
        </div>
    </div>

    <script>
        let rooms = [];
        let adjacencies = [];
        // Bauhaus + Light Primary Palette
        const colors = ['#FF4500', '#0055ff', '#FFCC00', '#FFB3B3', '#D4E5FF', '#FFF5CC'];
        const scale = 15; 
        const SNAP_DIST = 20;

        function addRoom() {
            const name = document.getElementById('rName').value;
            const size = Math.sqrt(parseFloat(document.getElementById('rSqm').value)) * scale;
            const id = 'room-' + Date.now();
            
            const box = document.createElement('div');
            box.className = 'room-box';
            box.id = id;
            box.style.width = size + 'px';
            box.style.height = size + 'px';
            box.style.left = '50px'; box.style.top = '50px';
            box.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            box.innerHTML = `<strong>${name}</strong><br><span class="dims"></span>`;
            
            new ResizeObserver(e => {
                const b = e[0].target;
                b.querySelector('.dims').innerText = `${(b.offsetWidth/scale).toFixed(0)}m x ${(b.offsetHeight/scale).toFixed(0)}m`;
                renderLines();
            }).observe(box);

            box.onmousedown = startDrag;
            document.getElementById('canvas').appendChild(box);
            rooms.push({ id, name });
            updateSelects();
        }

        function updateSelects() {
            const sels = [document.getElementById('roomA'), document.getElementById('roomB')];
            sels.forEach(s => {
                s.innerHTML = '';
                rooms.forEach(r => {
                    let opt = document.createElement('option');
                    opt.value = r.id; opt.innerText = r.name;
                    s.appendChild(opt);
                });
            });
        }

        function addAdjacency() {
            adjacencies.push({ a: document.getElementById('roomA').value, b: document.getElementById('roomB').value });
            renderLines();
        }

        function renderLines() {
            const svg = document.getElementById('svgLayer');
            svg.innerHTML = '';
            adjacencies.forEach(adj => {
                const elA = document.getElementById(adj.a);
                const elB = document.getElementById(adj.b);
                if (!elA || !elB) return;
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", elA.offsetLeft + elA.offsetWidth/2);
                line.setAttribute("y1", elA.offsetTop + elA.offsetHeight/2);
                line.setAttribute("x2", elB.offsetLeft + elB.offsetWidth/2);
                line.setAttribute("y2", elB.offsetTop + elB.offsetHeight/2);
                line.setAttribute("class", "line");
                svg.appendChild(line);
            });
        }

        function startDrag(e) {
            let el = e.target.closest('.room-box');
            let shiftX = e.clientX - el.getBoundingClientRect().left;
            let shiftY = e.clientY - el.getBoundingClientRect().top;
            const canvas = document.getElementById('canvas').getBoundingClientRect();
            
            function move(e) {
                let left = e.clientX - shiftX - canvas.left;
                let top = e.clientY - shiftY - canvas.top;

                // Snap Logic
                rooms.forEach(r => {
                    if (r.id === el.id) return;
                    let target = document.getElementById(r.id);
                    let tx = target.offsetLeft, ty = target.offsetTop;
                    let tw = target.offsetWidth, th = target.offsetHeight;

                    if (Math.abs(left - (tx + tw)) < SNAP_DIST) left = tx + tw; // Snap right
                    else if (Math.abs(left + el.offsetWidth - tx) < SNAP_DIST) left = tx - el.offsetWidth; // Snap left
                    
                    if (Math.abs(top - (ty + th)) < SNAP_DIST) top = ty + th; // Snap bottom
                    else if (Math.abs(top + el.offsetHeight - ty) < SNAP_DIST) top = ty - el.offsetHeight; // Snap top
                });

                el.style.left = left + 'px';
                el.style.top = top + 'px';
                renderLines();
            }
            
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', () => document.removeEventListener('mousemove', move));
        }
    </script>
</body>
</html>
