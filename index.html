<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RESEARCH DESK</title>
    <style>
        :root { --bg-color: #ffffff; --accent-orange: #ff4500; --text-main: #1a1a1a; }
        body { background-color: var(--bg-color); font-family: sans-serif; margin: 0; padding: 0; color: var(--text-main); }
        header { background: var(--accent-orange); color: white; padding: 20px; text-align: center; }
        footer { padding: 20px; text-align: center; font-size: 0.8rem; border-top: 1px solid #ccc; margin-top: 20px; }
        
        .main-container { padding: 20px; }
        .workspace-grid { display: grid; grid-template-columns: 300px 1fr 1fr; gap: 20px; height: 500px; }
        .controls { background: #f9f9f9; padding: 20px; border: 1px solid #ccc; overflow-y: auto; }
        .view-port { position: relative; border: 1px solid #ccc; background: #fafafa; overflow: hidden; }
        
        .room-box {
            position: absolute; border: 2px solid var(--text-main); padding: 5px; cursor: grab;
            display: flex; flex-direction: column; resize: both; overflow: auto; min-width: 36px; min-height: 36px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1); user-select: none; z-index: 10;
            font-weight: bold; text-transform: uppercase; font-size: 10px; background-color: white;
        }
        .room-box.selected { border-color: var(--accent-orange); box-shadow: 0 0 10px var(--accent-orange); }
        .dims { font-size: 0.75rem; color: #333; font-family: Arial, sans-serif; font-weight: normal; text-transform: none; margin-top: 5px; }
        .delete-btn { cursor: pointer; color: #cc0000; float: right; }
        .export-btn { position: absolute; top: 10px; right: 10px; background: #333; color: white; border: none; padding: 5px 10px; cursor: not-allowed; z-index: 100; }
        .adj-line { stroke: var(--accent-orange); stroke-width: 3; stroke-dasharray: 5,5; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <header><h1>RESEARCH DESK</h1></header>

    <div class="main-container">
        <div class="workspace-grid">
            <div class="controls">
                <h3>Configuration</h3>
                <label><input type="checkbox" id="snapGrid"> Snap to Grid</label><br>
                <label><input type="checkbox" id="showGrid" onchange="renderGrid()"> Show Grid</label>

                <h3 style="margin-top:20px;">Room Selection</h3>
                <select id="presetRoom" style="width:100%; margin-bottom:5px;">
                    <option value="Living">Living</option><option value="Dining">Dining</option>
                    <option value="Kitchen">Kitchen</option><option value="Circulation">Circulation</option>
                </select>
                <input type="text" id="cName" placeholder="Custom Name" style="width:95%; margin-bottom:5px;"><br>
                <input type="number" id="cSqm" placeholder="SQM" style="width:95%; margin-bottom:5px;"><br>
                <button onclick="addRoom()" style="background:var(--accent-orange); color:white; width:100%; border:none; padding:10px; cursor:pointer;">ADD ROOM</button>

                <h3 style="margin-top:20px;">Room Properties</h3>
                <label>Color: </label><input type="color" id="roomColor" onchange="updateRoomColor(this.value)"><br>
                <label>Height (m): </label><input type="range" id="hSlider" min="1" max="10" step="0.5" value="3" style="width:100%" oninput="updateHeight(this.value)">

                <h3 style="margin-top:20px;">Adjacency Link</h3>
                <select id="link1" style="width:100%; margin-bottom:5px;"></select>
                <select id="link2" style="width:100%; margin-bottom:5px;"></select>
                <button onclick="addLink()" style="background:#555; color:white; width:100%; border:none; padding:5px;">LINK ROOMS</button>
            </div>

            <div id="canvas-2d" class="view-port">
                <button class="export-btn">EXPORT DXF</button>
                <svg id="svg-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>
            </div>
            <div id="canvas-3d" class="view-port"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 RESEARCH DESK. All rights reserved. | Contact: hello@researchdesk.com</p>
    </footer>

    <script>
        let rooms = [];
        let connections = [];
        let selectedId = null;
        let scene, camera, renderer;
        const scale = 10;
        const snapStep = 1.2 * scale;

        function renderGrid() {
            const svg = document.getElementById('svg-layer');
            svg.querySelectorAll('.grid-line').forEach(l => l.remove());
            if(!document.getElementById('showGrid').checked) return;
            
            let pos = 0; let use24 = true;
            for(let i=0; i<30; i++) {
                let px = pos * scale;
                svg.innerHTML += `<line class="grid-line" x1="${px}" y1="0" x2="${px}" y2="100%" stroke="#eee"/>`;
                svg.innerHTML += `<line class="grid-line" x1="0" y1="${px}" x2="100%" y1="${px}" stroke="#eee"/>`;
                pos += (use24 ? 2.4 : 7.2); use24 = !use24;
            }
        }

        function addRoom() {
            const name = document.getElementById('cName').value || document.getElementById('presetRoom').value;
            const sqm = parseFloat(document.getElementById('cSqm').value) || 12;
            const id = 'room-' + Date.now();
            const side = Math.sqrt(sqm) * scale;
            
            const box = document.createElement('div');
            box.className = 'room-box'; box.id = id;
            box.style.width = side + 'px'; box.style.height = side + 'px';
            box.style.left = '50px'; box.style.top = '50px';
            box.innerHTML = `<div>${name} <span class="delete-btn" onclick="deleteRoom('${id}')">X</span></div><span class="dims">${(side/scale).toFixed(1)}m x ${(side/scale).toFixed(1)}m</span>`;
            
            box.onclick = () => selectRoom(id);
            box.onmousedown = startDrag;
            document.getElementById('canvas-2d').appendChild(box);
            
            rooms.push({ id, name, h: 3, color: '#ffffff' });
            updateLinkDropdowns();
            selectRoom(id);
            render3D();
        }

        function updateLinkDropdowns() {
            const l1 = document.getElementById('link1'); const l2 = document.getElementById('link2');
            l1.innerHTML = ''; l2.innerHTML = '';
            rooms.forEach(r => {
                l1.innerHTML += `<option value="${r.id}">${r.name}</option>`;
                l2.innerHTML += `<option value="${r.id}">${r.name}</option>`;
            });
        }

        function addLink() {
            const r1 = document.getElementById('link1').value;
            const r2 = document.getElementById('link2').value;
            if(r1 && r2 && r1 !== r2) connections.push({r1, r2});
            renderAdjacency();
        }

        function renderAdjacency() {
            const svg = document.getElementById('svg-layer');
            svg.querySelectorAll('.adj-line').forEach(l => l.remove());
            connections.forEach(conn => {
                const b1 = document.getElementById(conn.r1).getBoundingClientRect();
                const b2 = document.getElementById(conn.r2).getBoundingClientRect();
                const cvs = document.getElementById('canvas-2d').getBoundingClientRect();
                svg.innerHTML += `<line class="adj-line" x1="${b1.left + b1.width/2 - cvs.left}" y1="${b1.top + b1.height/2 - cvs.top}" x2="${b2.left + b2.width/2 - cvs.left}" y2="${b2.top + b2.height/2 - cvs.top}"/>`;
            });
        }

        function updateRoomColor(col) {
            if(!selectedId) return;
            document.getElementById(selectedId).style.backgroundColor = col;
            rooms.find(r => r.id === selectedId).color = col;
            render3D();
        }

        function selectRoom(id) {
            selectedId = id;
            document.querySelectorAll('.room-box').forEach(el => el.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
        }

        function updateHeight(val) {
            if(!selectedId) return;
            rooms.find(r => r.id === selectedId).h = parseFloat(val);
            render3D();
        }

        function deleteRoom(id) {
            document.getElementById(id).remove();
            rooms = rooms.filter(r => r.id !== id);
            connections = connections.filter(c => c.r1 !== id && c.r2 !== id);
            updateLinkDropdowns();
            render3D(); renderAdjacency();
        }

        function startDrag(e) {
            if (e.target.classList.contains('delete-btn')) return;
            let el = e.target.closest('.room-box');
            let shiftX = e.clientX - el.getBoundingClientRect().left;
            let shiftY = e.clientY - el.getBoundingClientRect().top;
            
            function move(e) {
                el.style.left = (e.clientX - shiftX - document.getElementById('canvas-2d').getBoundingClientRect().left) + 'px';
                el.style.top = (e.clientY - shiftY - document.getElementById('canvas-2d').getBoundingClientRect().top) + 'px';
                renderAdjacency();
            }
            function end() {
                document.removeEventListener('mousemove', move);
                if(document.getElementById('snapGrid').checked) {
                    el.style.left = Math.round(parseInt(el.style.left) / snapStep) * snapStep + 'px';
                    el.style.top = Math.round(parseInt(el.style.top) / snapStep) * snapStep + 'px';
                }
                render3D(); renderAdjacency();
            }
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', end, {once: true});
        }

        function init3D() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
            camera = new THREE.OrthographicCamera(-50, 50, 50, -50, 0.1, 1000);
            camera.position.set(20, 20, 20); camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(document.getElementById('canvas-3d').clientWidth, document.getElementById('canvas-3d').clientHeight);
            document.getElementById('canvas-3d').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            scene.add(new THREE.DirectionalLight(0xffffff, 1.0));
            function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
            animate();
        }

        function render3D() {
            scene.children.filter(c => c.type === 'Mesh').forEach(c => scene.remove(c));
            rooms.forEach(r => {
                const el = document.getElementById(r.id);
                const geom = new THREE.BoxGeometry(el.offsetWidth/scale, r.h, el.offsetHeight/scale);
                const mat = new THREE.MeshLambertMaterial({ color: r.color });
                const cube = new THREE.Mesh(geom, mat);
                const edges = new THREE.EdgesGeometry(geom);
                cube.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 })));
                cube.position.set((parseInt(el.style.left) - 100)/scale, r.h/2, (parseInt(el.style.top) - 100)/scale);
                scene.add(cube);
            });
        }

        window.onload = init3D;
    </script>
</body>
</html>
