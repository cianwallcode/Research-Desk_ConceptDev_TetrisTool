<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RESEARCH DESK</title>
    <style>
        :root { --bg-color: #ffffff; --accent-orange: #ff4500; --text-main: #1a1a1a; }
        body { background-color: var(--bg-color); font-family: sans-serif; margin: 0; padding: 0; color: var(--text-main); }
        header { background: var(--accent-orange); color: white; padding: 20px; text-align: center; }
        footer { padding: 20px; text-align: center; font-size: 0.8rem; border-top: 1px solid #ccc; margin-top: 20px; }
        
        .main-container { padding: 20px; }
        .workspace-grid { display: grid; grid-template-columns: 300px 1fr 1fr; gap: 20px; height: 60vh; }
        .controls { background: #f9f9f9; padding: 20px; border: 1px solid #ccc; overflow-y: auto; }
        .view-port { position: relative; border: 1px solid #ccc; background: #fafafa; overflow: hidden; min-height: 400px; }
        
        .room-box {
            position: absolute; border: 2px solid var(--text-main); padding: 5px; cursor: grab;
            display: flex; flex-direction: column; resize: both; overflow: auto; min-width: 36px; min-height: 36px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1); user-select: none; z-index: 10;
            font-weight: bold; text-transform: uppercase; font-size: 10px; background-color: white;
        }
        .room-box.selected { border-color: var(--accent-orange); box-shadow: 0 0 10px var(--accent-orange); }
        .dims { font-size: 0.75rem; color: #333; font-family: Arial, sans-serif; font-weight: normal; text-transform: none; margin-top: 5px; }
        .delete-btn { cursor: pointer; color: #cc0000; float: right; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <header><h1>RESEARCH DESK</h1></header>

    <div class="main-container">
        <div class="workspace-grid">
            <div class="controls">
                <h3>Control Panel</h3>
                <label><input type="checkbox" id="snapToggle" checked> Snap to Grid</label><br>
                <label><input type="checkbox" id="showGrid" onchange="renderGrid()"> Show Grid</label>
                
                <h3 style="margin-top:20px;">Add Custom Room</h3>
                <input type="text" id="cName" placeholder="Room Name" style="width:90%; margin-bottom:5px;"><br>
                <input type="number" id="cSqm" placeholder="Target SQM" style="width:90%; margin-bottom:5px;"><br>
                <button onclick="addCustomRoom()" style="background:var(--accent-orange); color:white; width:95%; border:none; padding:10px; cursor:pointer;">START PROJECT</button>

                <h3 style="margin-top:20px;">Room Height</h3>
                <input type="range" id="hSlider" min="1" max="10" step="0.5" value="3" style="width:100%" oninput="updateHeight(this.value)">
                <p id="hVal">3m</p>
            </div>

            <div id="canvas-2d" class="view-port">
                <svg id="grid-svg" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>
            </div>
            <div id="canvas-3d" class="view-port"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 RESEARCH DESK. All rights reserved. | Contact: hello@researchdesk.com</p>
    </footer>

    <script>
        let rooms = [];
        let selectedId = null;
        const scale = 10; // 1m = 10px
        const snapStep = 2.4 * scale;

        function renderGrid() {
            const svg = document.getElementById('grid-svg');
            svg.innerHTML = '';
            if(!document.getElementById('showGrid').checked) return;
            
            let pos = 0;
            let use24 = true;
            while(pos < 1000) {
                let px = pos * scale;
                svg.innerHTML += `<line x1="${px}" y1="0" x2="${px}" y2="100%" stroke="#ccc" stroke-width="1"/>`;
                svg.innerHTML += `<line x1="0" y1="${px}" x2="100%" y2="${px}" stroke="#ccc" stroke-width="1"/>`;
                pos += (use24 ? 2.4 : 7.2);
                use24 = !use24;
            }
        }

        function addCustomRoom() {
            const name = document.getElementById('cName').value || "Room";
            const sqm = parseFloat(document.getElementById('cSqm').value) || 12;
            const id = 'room-' + Date.now();
            
            // Calculate size based on SQM
            const side = Math.sqrt(sqm) * scale;
            
            const box = document.createElement('div');
            box.className = 'room-box'; box.id = id;
            box.style.width = side + 'px'; 
            box.style.height = side + 'px';
            box.style.left = '50px'; box.style.top = '50px';
            box.style.backgroundColor = '#ffffff';
            box.innerHTML = `<div>${name} <span class="delete-btn" onclick="deleteRoom('${id}')">X</span></div><span class="dims">${sqm}sqm</span>`;
            
            box.onclick = () => selectRoom(id);
            box.onmousedown = startDrag;
            document.getElementById('canvas-2d').appendChild(box);
            
            rooms.push({ id, name, sqm, h: 3 });
            selectRoom(id);
            render3D();
        }

        function selectRoom(id) {
            selectedId = id;
            document.querySelectorAll('.room-box').forEach(el => el.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
        }

        function updateHeight(val) {
            if(!selectedId) return;
            rooms.find(r => r.id === selectedId).h = parseFloat(val);
            document.getElementById('hVal').innerText = val + 'm';
            render3D();
        }

        function deleteRoom(id) {
            document.getElementById(id).remove();
            rooms = rooms.filter(r => r.id !== id);
            render3D();
        }

        function startDrag(e) {
            if (e.target.classList.contains('delete-btn')) return;
            let el = e.target.closest('.room-box');
            let shiftX = e.clientX - el.getBoundingClientRect().left;
            let shiftY = e.clientY - el.getBoundingClientRect().top;
            
            function move(e) {
                let left = e.clientX - shiftX - document.getElementById('canvas-2d').getBoundingClientRect().left;
                let top = e.clientY - shiftY - document.getElementById('canvas-2d').getBoundingClientRect().top;
                el.style.left = left + 'px';
                el.style.top = top + 'px';
            }
            
            function end() {
                document.removeEventListener('mousemove', move);
                if(document.getElementById('snapToggle').checked) {
                    el.style.left = Math.round(parseInt(el.style.left) / snapStep) * snapStep + 'px';
                    el.style.top = Math.round(parseInt(el.style.top) / snapStep) * snapStep + 'px';
                }
                render3D();
            }
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', end, {once: true});
        }

        function init3D() {
            window.scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            let camera = new THREE.OrthographicCamera(-50, 50, 50, -50, 0.1, 1000);
            camera.position.set(20, 20, 20); camera.lookAt(0, 0, 0);
            
            window.renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setClearColor(0xffffff);
            const container = document.getElementById('canvas-3d');
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            scene.add(new THREE.DirectionalLight(0xffffff, 1.0));
            animate();
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

        function render3D() {
            scene.children.filter(c => c.type === 'Mesh').forEach(c => scene.remove(c));
            rooms.forEach(r => {
                const el = document.getElementById(r.id);
                const geom = new THREE.BoxGeometry(el.offsetWidth/scale, r.h, el.offsetHeight/scale);
                const mat = new THREE.MeshLambertMaterial({ color: 0xff4500 });
                const cube = new THREE.Mesh(geom, mat);
                const edges = new THREE.EdgesGeometry(geom);
                cube.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 })));
                cube.position.set((parseInt(el.style.left) - 100)/scale, r.h/2, (parseInt(el.style.top) - 100)/scale);
                scene.add(cube);
            });
        }

        window.onload = () => {
            init3D();
        };
    </script>
</body>
</html>
