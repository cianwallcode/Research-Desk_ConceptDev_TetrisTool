<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RESEARCH DESK</title>

    <style>
        :root { --bg-color: #f0f0f0; --accent-orange: #ff4500; --text-main: #1a1a1a; }
        body { background-color: var(--bg-color); font-family: sans-serif; margin: 0; padding: 2rem; }
        header { border-bottom: 2px solid var(--accent-orange); margin-bottom: 2rem; padding-bottom: 1rem; }
        .workspace-grid { display: grid; grid-template-columns: 300px 1fr 1fr; gap: 20px; height: 60vh; }
        .controls { background: white; padding: 20px; border: 1px solid #ccc; overflow-y: auto; }
        .view-port { position: relative; border: 1px solid #ccc; background: #fafafa; overflow: hidden; }
        
        #canvas-2d { background-color: #fafafa; position: relative; }
        
        .room-box {
            position: absolute; border: 2px solid var(--text-main); padding: 5px; cursor: grab;
            display: flex; flex-direction: column; resize: both; overflow: auto; min-width: 18px; min-height: 18px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1); user-select: none; z-index: 10;
            font-weight: bold; text-transform: uppercase; font-size: 10px; background-color: white;
        }
        .room-box.selected { border-color: blue; box-shadow: 0 0 10px blue; }
        .dims { font-size: 0.75rem; color: #333; font-family: Arial, sans-serif; font-weight: normal; text-transform: none; margin-top: 5px; }
        .delete-btn { cursor: pointer; color: #cc0000; float: right; }
        
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 0.8rem; }
        .swatch { width: 15px; height: 15px; margin-right: 10px; border: 1px solid #000; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <header><h1>RESEARCH DESK</h1></header>

    <div class="workspace-grid">
        <div class="controls">
            <h3>Configuration</h3>
            <label><input type="checkbox" id="snapToggle" checked> Snap to Grid</label><br>
            <label><input type="checkbox" id="showGrid" onchange="renderGrid()" checked> Show Custom Grid</label>

            <h3>Legend</h3>
            <div id="legend"></div>

            <h3>Program</h3>
            <select id="rName" style="width: 100%;">
                <option value="Living">Living</option><option value="Kitchen">Kitchen</option>
                <option value="Bathroom">Bathroom</option><option value="Circulation">Circulation</option>
            </select>
            <button onclick="addRoom()" style="background:var(--accent-orange); color:white; width:100%; border:none; padding:10px; margin-top:10px;">ADD ROOM</button>

            <h3 style="margin-top:20px;">Selected Room Height</h3>
            <input type="range" id="hSlider" min="1" max="10" step="0.5" value="3" style="width:100%" oninput="updateSelectedHeight(this.value)">
            <p id="hVal">3m</p>
        </div>

        <div id="canvas-2d" class="view-port">
            <svg id="grid-svg" style="position:absolute; top:0; left:0; width:100%; height:100%;"></svg>
        </div>
        <div id="canvas-3d" class="view-port"></div>
    </div>

    <script>
        let rooms = [];
        let selectedId = null;
        const scale = 15; // 1m = 15px
        const snapStep = 1.2 * scale; // Snap to 1.2m
        const colorMap = { "Living": "#FFCC00", "Kitchen": "#FFCC00", "Bathroom": "#D4E5FF", "Circulation": "#FFCC00", "Custom": "#CCCCCC" };

        const legendDiv = document.getElementById('legend');
        Object.entries(colorMap).forEach(([name, color]) => {
            legendDiv.innerHTML += `<div class="legend-item"><div class="swatch" style="background:${color}"></div>${name}</div>`;
        });

        function renderGrid() {
            const svg = document.getElementById('grid-svg');
            svg.innerHTML = '';
            if(!document.getElementById('showGrid').checked) return;
            
            let pos = 0, step = 1.2;
            while(pos < 100) {
                let px = pos * scale;
                svg.innerHTML += `<line x1="${px}" y1="0" x2="${px}" y2="100%" stroke="#ddd" stroke-width="1"/>`;
                svg.innerHTML += `<line x1="0" y1="${px}" x2="100%" y2="${px}" stroke="#ddd" stroke-width="1"/>`;
                svg.innerHTML += `<text x="${px+2}" y="15" font-size="10" fill="#999">${pos.toFixed(1)}m</text>`;
                pos += step;
                step = (step === 1.2) ? 2.4 : 1.2;
            }
        }

        function addRoom() {
            let name = document.getElementById('rName').value;
            const id = 'room-' + Date.now();
            const box = document.createElement('div');
            box.className = 'room-box'; box.id = id;
            box.style.width = snapStep + 'px'; 
            box.style.height = snapStep + 'px';
            box.style.left = '30px'; box.style.top = '30px';
            box.style.backgroundColor = colorMap[name];
            box.innerHTML = `<div>${name} <span class="delete-btn" onclick="deleteRoom('${id}')">X</span></div><span class="dims"></span>`;
            
            box.onclick = () => selectRoom(id);
            box.onmousedown = startDrag;
            document.getElementById('canvas-2d').appendChild(box);
            
            // Resize snapping
            new ResizeObserver((entries) => {
                const b = entries[0].target;
                if(document.getElementById('snapToggle').checked) {
                    // Prevent infinite loop
                    const newW = Math.round(b.offsetWidth / snapStep) * snapStep;
                    const newH = Math.round(b.offsetHeight / snapStep) * snapStep;
                    if (Math.abs(b.offsetWidth - newW) > 5) b.style.width = newW + 'px';
                    if (Math.abs(b.offsetHeight - newH) > 5) b.style.height = newH + 'px';
                }
                const w = (b.offsetWidth/scale).toFixed(1);
                const h = (b.offsetHeight/scale).toFixed(1);
                b.querySelector('.dims').innerText = `${w}m x ${h}m`;
                render3D();
            }).observe(box);

            rooms.push({ id, name, h: 3 });
            selectRoom(id);
            render3D();
        }

        function selectRoom(id) {
            selectedId = id;
            document.querySelectorAll('.room-box').forEach(el => el.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
            const room = rooms.find(r => r.id === id);
            document.getElementById('hSlider').value = room.h;
            document.getElementById('hVal').innerText = room.h + 'm';
        }

        function updateSelectedHeight(val) {
            if(!selectedId) return;
            rooms.find(r => r.id === selectedId).h = parseFloat(val);
            document.getElementById('hVal').innerText = val + 'm';
            render3D();
        }

        function deleteRoom(id) {
            document.getElementById(id).remove();
            rooms = rooms.filter(r => r.id !== id);
            render3D();
        }

        function startDrag(e) {
            if (e.target.classList.contains('delete-btn')) return;
            let el = e.target.closest('.room-box');
            let shiftX = e.clientX - el.getBoundingClientRect().left;
            let shiftY = e.clientY - el.getBoundingClientRect().top;
            
            function move(e) {
                let left = e.clientX - shiftX - document.getElementById('canvas-2d').getBoundingClientRect().left;
                let top = e.clientY - shiftY - document.getElementById('canvas-2d').getBoundingClientRect().top;
                
                if(document.getElementById('snapToggle').checked) {
                    left = Math.round(left / snapStep) * snapStep;
                    top = Math.round(top / snapStep) * snapStep;
                }
                el.style.left = left + 'px';
                el.style.top = top + 'px';
                render3D();
            }
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', () => document.removeEventListener('mousemove', move));
        }

        function init3D() {
            window.scene = new THREE.Scene();
            scene.background = new THREE.Color(0xfafafa);
            let camera = new THREE.OrthographicCamera(-20, 20, 20, -20, 0.1, 1000);
            camera.position.set(20, 20, 20); camera.lookAt(0, 0, 0);
            window.renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setClearColor(0xfafafa);
            renderer.setSize(document.getElementById('canvas-3d').clientWidth, 400);
            document.getElementById('canvas-3d').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            scene.add(new THREE.DirectionalLight(0xffffff, 0.8));
            animate();
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

        function render3D() {
            scene.children.filter(c => c.type === 'Mesh').forEach(c => scene.remove(c));
            rooms.forEach(r => {
                const el = document.getElementById(r.id);
                const geom = new THREE.BoxGeometry(el.offsetWidth/scale, r.h, el.offsetHeight/scale);
                const mat = new THREE.MeshLambertMaterial({ color: colorMap[r.name] });
                const cube = new THREE.Mesh(geom, mat);
                const edges = new THREE.EdgesGeometry(geom);
                cube.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 })));
                cube.position.set((el.offsetLeft - 150)/scale, r.h/2, (el.offsetTop - 50)/scale);
                scene.add(cube);
            });
        }

        init3D();
        renderGrid();
    </script>
</body>
</html>
