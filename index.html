<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RESEARCH DESK: 3D AXONOMETRIC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f0f0; --grid-color: #d1d1d1; --accent-orange: #ff4500;
            --text-main: #1a1a1a; --col-yellow: #FFCC00; --col-green: #77DD77;
            --col-orange: #FF4500; --col-neutral: #E0E0E0;
        }
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: var(--bg-color); }
        .workspace-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; height: 85vh; }
        .controls { background: white; padding: 20px; border: 1px solid #ccc; overflow-y: auto; }
        .view-port { position: relative; border: 2px solid var(--text-main); background: #fff; overflow: hidden; }
        #canvas-2d { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; }
        #canvas-3d { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 0; }
        
        .room-box {
            position: absolute; border: 2px solid var(--text-main); padding: 5px; cursor: grab;
            display: flex; flex-direction: column; resize: both; overflow: auto; min-width: 60px; min-height: 60px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1); user-select: none; z-index: 10;
            font-family: Arial, sans-serif; text-transform: uppercase; font-weight: bold; font-size: 10px;
        }
        .delete-btn { cursor: pointer; color: #cc0000; float: right; }
    </style>
</head>
<body>

    <header><h1>RESEARCH DESK</h1></header>

    <div class="workspace-grid">
        <div class="controls">
            <h3>Program</h3>
            <select id="rName" style="width: 100%;">
                <option value="Living">Living</option><option value="Kitchen">Kitchen</option>
                <option value="Circulation">Circulation</option><option value="Exterior">Exterior</option>
            </select>
            <button onclick="addRoom()" style="background:var(--accent-orange); color:white; width:100%; margin-top:10px;">ADD ROOM</button>
            <label style="display:block; margin-top:20px;">Toggle View:</label>
            <button onclick="toggleView()">SWITCH 2D / 3D</button>
        </div>

        <div class="view-port">
            <div id="canvas-2d"></div>
            <div id="canvas-3d"></div>
        </div>
    </div>

    <script>
        let rooms = [];
        let scene, camera, renderer, mode = '2d';
        const colorMap = { "Living": 0xFFCC00, "Kitchen": 0xFFCC00, "Circulation": 0xFF4500, "Exterior": 0x77DD77 };

        // 3D Setup
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);
            camera = new THREE.OrthographicCamera(-20, 20, 20, -20, 0.1, 1000);
            camera.position.set(10, 10, 10);
            camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(document.querySelector('.view-port').clientWidth, document.querySelector('.view-port').clientHeight);
            document.getElementById('canvas-3d').appendChild(renderer.domElement);
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));
            animate();
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

        function update3D() {
            scene.children = scene.children.filter(c => c.type !== 'Mesh');
            rooms.forEach(r => {
                const el = document.getElementById(r.id);
                const geom = new THREE.BoxGeometry(el.offsetWidth/20, 1, el.offsetHeight/20);
                const mat = new THREE.MeshLambertMaterial({ color: colorMap[r.name] || 0xcccccc });
                const cube = new THREE.Mesh(geom, mat);
                cube.position.set((el.offsetLeft - 300)/20, 0, (el.offsetTop)/20);
                scene.add(cube);
            });
        }

        function toggleView() {
            mode = (mode === '2d') ? '3d' : '2d';
            document.getElementById('canvas-2d').style.zIndex = (mode === '2d') ? 10 : 0;
            document.getElementById('canvas-3d').style.zIndex = (mode === '3d') ? 10 : 0;
            if (mode === '3d') update3D();
        }

        function addRoom() {
            const name = document.getElementById('rName').value;
            const id = 'room-' + Date.now();
            const box = document.createElement('div');
            box.className = 'room-box'; box.id = id;
            box.style.width = '100px'; box.style.height = '100px';
            box.style.left = '50px'; box.style.top = '50px';
            box.style.backgroundColor = '#' + colorMap[name].toString(16);
            box.innerHTML = `<div>${name} <span class="delete-btn" onclick="deleteRoom('${id}')">X</span></div>`;
            box.onmousedown = startDrag;
            document.getElementById('canvas-2d').appendChild(box);
            rooms.push({ id, name });
        }

        function deleteRoom(id) {
            document.getElementById(id).remove();
            rooms = rooms.filter(r => r.id !== id);
        }

        function startDrag(e) {
            if (e.target.classList.contains('delete-btn')) return;
            let el = e.target.closest('.room-box');
            let shiftX = e.clientX - el.getBoundingClientRect().left;
            let shiftY = e.clientY - el.getBoundingClientRect().top;
            function move(e) {
                el.style.left = (e.clientX - shiftX - document.getElementById('canvas-2d').offsetLeft) + 'px';
                el.style.top = (e.clientY - shiftY - document.getElementById('canvas-2d').offsetTop) + 'px';
            }
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', () => document.removeEventListener('mousemove', move));
        }

        init3D();
    </script>
</body>
</html>
