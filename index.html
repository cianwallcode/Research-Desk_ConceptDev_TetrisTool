<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RESEARCH DESK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --bg-color: #f0f0f0; --accent-orange: #ff4500; --text-main: #1a1a1a; --grid-color: #d1d1d1; }
        body { background-color: var(--bg-color); font-family: sans-serif; margin: 0; padding: 2rem; }
        header { border-bottom: 1px solid var(--text-main); margin-bottom: 2rem; }
        footer { margin-top: 40px; border-top: 1px solid var(--text-main); padding-top: 20px; font-family: Arial, sans-serif; font-size: 0.8rem; }
        
        .workspace-grid { display: grid; grid-template-columns: 300px 1fr 1fr; gap: 20px; height: 70vh; }
        .controls { background: white; padding: 20px; border: 1px solid #ccc; overflow-y: auto; }
        .view-port { position: relative; border: 1px solid #ccc; background: #fafafa; overflow: hidden; }
        
        /* 2D Canvas Overrides */
        #canvas-2d { position: relative; }
        .room-box {
            position: absolute; border: 2px solid var(--text-main); padding: 10px; cursor: grab;
            display: flex; flex-direction: column; resize: both; overflow: auto; min-width: 60px; min-height: 60px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1); user-select: none; z-index: 10;
            font-weight: bold; text-transform: uppercase; font-size: 10px;
        }
        .room-box.selected { border-color: blue; box-shadow: 0 0 10px blue; }
        .dims { font-size: 0.75rem; color: #333; font-family: Arial, sans-serif; font-weight: normal; text-transform: none; margin-top: 5px; }
        .delete-btn { cursor: pointer; color: #cc0000; float: right; }
        
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 0.8rem; }
        .swatch { width: 15px; height: 15px; margin-right: 10px; border: 1px solid #000; }
        .line { stroke: var(--text-main); stroke-width: 3; stroke-dasharray: 6; pointer-events: none; }
    </style>
</head>
<body>

    <header><h1>RESEARCH DESK</h1></header>

    <div class="workspace-grid">
        <div class="controls">
            <h3>Legend</h3>
            <div id="legend"></div>

            <h3 style="margin-top:20px;">Program</h3>
            <select id="rName" style="width: 100%; margin-bottom: 10px;">
                <option value="Living">Living</option><option value="Kitchen">Kitchen</option>
                <option value="Circulation">Circulation</option><option value="Exterior">Exterior</option>
            </select>
            <select id="rSqm" style="width: 100%; margin-bottom: 10px;">
                <option value="10">10sqm</option><option value="50">50sqm</option><option value="100">100sqm</option>
            </select>
            <button onclick="addRoom()" style="background:var(--accent-orange); color:white; width:100%; border:none; padding:10px;">ADD ROOM</button>

            <h3 style="margin-top:20px;">Selected Room</h3>
            <label>Height (m):</label>
            <input type="range" id="hSlider" min="1" max="10" step="0.5" value="3" style="width:100%" oninput="updateRoomHeight(this.value)">
            <p id="hVal">3m</p>

            <h3 style="margin-top:20px;">Adjacency</h3>
            <select id="roomA" style="width:100%"></select> near
            <select id="roomB" style="width:100%"></select>
            <button onclick="addAdjacency()" style="margin-top:10px; width:100%;">Connect</button>
        </div>

        <div id="canvas-2d" class="view-port">
            <svg id="svgLayer" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>
        </div>
        <div id="canvas-3d" class="view-port"></div>
    </div>

    <footer>
        <p>&copy; 2026 RESEARCH DESK. All rights reserved. | Contact: hello@researchdesk.com</p>
    </footer>

    <script>
        let rooms = [];
        let adjacencies = [];
        let selectedId = null;
        let scene, camera, renderer;
        const scale = 15;
        const colorMap = { "Living": 0xFFCC00, "Kitchen": 0xFFCC00, "Circulation": 0xFF4500, "Exterior": 0x77DD77 };

        // Initialize Legend
        const legendDiv = document.getElementById('legend');
        Object.entries(colorMap).forEach(([name, color]) => {
            legendDiv.innerHTML += `<div class="legend-item"><div class="swatch" style="background:#${color.toString(16).padStart(6, '0')}"></div>${name}</div>`;
        });

        // 3D Setup
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xfafafa);
            camera = new THREE.OrthographicCamera(-20, 20, 20, -20, 0.1, 1000);
            camera.position.set(20, 20, 20);
            camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            const container = document.getElementById('canvas-3d');
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            animate();
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

        function render3D() {
            scene.children.filter(c => c.type === 'Mesh').forEach(c => scene.remove(c));
            rooms.forEach(r => {
                const el = document.getElementById(r.id);
                const geom = new THREE.BoxGeometry(el.offsetWidth/15, r.h, el.offsetHeight/15);
                const mat = new THREE.MeshLambertMaterial({ color: colorMap[r.name] || 0xcccccc });
                const cube = new THREE.Mesh(geom, mat);
                cube.position.set((el.offsetLeft - 300)/15, r.h/2, (el.offsetTop - 50)/15);
                scene.add(cube);
            });
        }

        function addRoom() {
            const name = document.getElementById('rName').value;
            const size = Math.sqrt(parseFloat(document.getElementById('rSqm').value)) * scale;
            const id = 'room-' + Date.now();
            const w = (name === 'Circulation') ? size * 1.5 : size;
            const h = (name === 'Circulation') ? size * 0.75 : size;
            
            const box = document.createElement('div');
            box.className = 'room-box'; box.id = id;
            box.style.width = w + 'px'; box.style.height = h + 'px';
            box.style.left = '50px'; box.style.top = '50px';
            box.style.backgroundColor = '#' + colorMap[name].toString(16).padStart(6, '0');
            box.innerHTML = `<div>${name} <span class="delete-btn" onclick="deleteRoom('${id}')">X</span></div><span class="dims"></span>`;
            
            box.onclick = () => selectRoom(id);
            box.onmousedown = startDrag;
            
            new ResizeObserver(() => {
                const b = document.getElementById(id);
                const w = (b.offsetWidth/scale).toFixed(0);
                const h = (b.offsetHeight/scale).toFixed(0);
                b.querySelector('.dims').innerText = `${w}m x ${h}m | ${w*h}sqm`;
                renderLines(); render3D();
            }).observe(box);

            document.getElementById('canvas-2d').appendChild(box);
            rooms.push({ id, name, h: 3 });
            updateSelects(); selectRoom(id); render3D();
        }

        function selectRoom(id) {
            selectedId = id;
            document.querySelectorAll('.room-box').forEach(el => el.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
            const room = rooms.find(r => r.id === id);
            document.getElementById('hSlider').value = room.h;
            document.getElementById('hVal').innerText = room.h + 'm';
        }

        function updateRoomHeight(val) {
            if (!selectedId) return;
            const room = rooms.find(r => r.id === selectedId);
            room.h = parseFloat(val);
            document.getElementById('hVal').innerText = val + 'm';
            render3D();
        }

        function deleteRoom(id) {
            document.getElementById(id).remove();
            rooms = rooms.filter(r => r.id !== id);
            adjacencies = adjacencies.filter(a => a.a !== id && a.b !== id);
            updateSelects(); renderLines(); render3D();
        }

        function updateSelects() {
            const sels = [document.getElementById('roomA'), document.getElementById('roomB')];
            sels.forEach(s => {
                s.innerHTML = '';
                rooms.forEach(r => {
                    let opt = document.createElement('option');
                    opt.value = r.id; opt.innerText = r.name;
                    s.appendChild(opt);
                });
            });
        }

        function addAdjacency() {
            adjacencies.push({ a: document.getElementById('roomA').value, b: document.getElementById('roomB').value });
            renderLines();
        }

        function renderLines() {
            const svg = document.getElementById('svgLayer');
            svg.innerHTML = '';
            adjacencies.forEach(adj => {
                const elA = document.getElementById(adj.a);
                const elB = document.getElementById(adj.b);
                if (!elA || !elB) return;
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", elA.offsetLeft + elA.offsetWidth/2);
                line.setAttribute("y1", elA.offsetTop + elA.offsetHeight/2);
                line.setAttribute("x2", elB.offsetLeft + elB.offsetWidth/2);
                line.setAttribute("y2", elB.offsetTop + elB.offsetHeight/2);
                line.setAttribute("class", "line");
                svg.appendChild(line);
            });
        }

        function startDrag(e) {
            if (e.target.classList.contains('delete-btn')) return;
            let el = e.target.closest('.room-box');
            let shiftX = e.clientX - el.getBoundingClientRect().left;
            let shiftY = e.clientY - el.getBoundingClientRect().top;
            function move(e) {
                el.style.left = (e.clientX - shiftX - document.getElementById('canvas-2d').offsetLeft) + 'px';
                el.style.top = (e.clientY - shiftY - document.getElementById('canvas-2d').offsetTop) + 'px';
                renderLines(); render3D();
            }
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', () => document.removeEventListener('mousemove', move));
        }

        init3D();
    </script>
</body>
</html>
