    <style>
        :root {
            --bg-color: #f0f0f0; --grid-color: #d1d1d1; --accent-orange: #ff4500;
            --text-main: #1a1a1a; --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Inter', Helvetica, sans-serif;
            --col-yellow: #FFCC00; --col-green: #77DD77;
            --col-orange: #FF4500; --col-neutral: #E0E0E0;
        }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                              linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: var(--font-serif);
            color: var(--text-main);
            margin: 0; padding: 2rem;
        }

        header { border-bottom: 1px solid var(--text-main); margin-bottom: 2rem; }
        footer { margin-top: 40px; border-top: 1px solid var(--text-main); padding-top: 20px; font-family: Arial, sans-serif; font-size: 0.8rem; }
        .workspace-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .controls { background: white; padding: 20px; border: 1px solid #ccc; height: fit-content; }
        .canvas-area { height: 80vh; position: relative; border: 1px dashed var(--text-main); background: #fafafa; overflow: hidden; }
        
        .room-box {
            position: absolute; border: 2px solid var(--text-main);
            padding: 10px; cursor: grab; display: flex; flex-direction: column;
            resize: both; overflow: auto; min-width: 60px; min-height: 60px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            user-select: none; z-index: 10;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            font-weight: bold;
        }
        .room-box:active { cursor: grabbing; box-shadow: 8px 8px 0px rgba(0,0,0,0.2); }
        .dims { font-size: 0.75rem; color: #333; font-family: Arial, sans-serif; font-weight: normal; text-transform: none; margin-top: 5px; }
        .delete-btn { cursor: pointer; color: #cc0000; float: right; font-size: 1rem; }
        .line { stroke: var(--text-main); stroke-width: 3; stroke-dasharray: 6; pointer-events: none; }
        
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-family: Arial, sans-serif; font-size: 0.8rem; }
        .swatch { width: 15px; height: 15px; margin-right: 10px; border: 1px solid #000; }
    </style>
</head>
<body>

    <header><h1>RESEARCH DESK</h1></header>

    <div class="workspace-grid">
        <div class="controls">
            <h3>Key / Legend</h3>
            <div id="legend"></div>

            <h3 style="margin-top:40px;">Program (Meters)</h3>
            <label>Room Type:</label><br>
            <select id="rName" style="width: 100%; margin-bottom: 10px;">
                <option value="Living">Living (Open Plan)</option>
                <option value="Kitchen">Kitchen (Open Plan)</option>
                <option value="Dining">Dining (Open Plan)</option>
                <option value="Circulation">Circulation</option>
                <option value="Exterior">Exterior / Grass</option>
                <option value="Bedroom">Bedroom</option>
                <option value="Office">Office</option>
            </select><br>
            <label>Area (sqm):</label><br>
            <select id="rSqm" style="width: 100%; margin-bottom: 10px;">
                <option value="10">10</option><option value="20">20</option><option value="30">30</option>
                <option value="40">40</option><option value="50">50</option><option value="60">60</option>
                <option value="70">70</option><option value="80">80</option><option value="90">90</option>
                <option value="100">100</option>
            </select>
            <button onclick="addRoom()" style="background:var(--accent-orange); color:white; border:none; padding:10px; width:100%; cursor:pointer;">ADD ROOM</button>

            <h3 style="margin-top:40px;">Adjacency</h3>
            <select id="roomA" style="width:100%"></select> <span>near</span>
            <select id="roomB" style="width:100%"></select>
            <button onclick="addAdjacency()" style="margin-top:10px; display:block; width:100%;">Connect</button>
        </div>

        <div id="canvas" class="canvas-area">
            <svg id="svgLayer" style="position:absolute; top:0; left:0; width:100%; height:100%;"></svg>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 RESEARCH DESK. All rights reserved. | Contact: hello@researchdesk.com</p>
    </footer>

    <script>
        let rooms = [];
        let adjacencies = [];
        const scale = 15; 
        const SNAP_DIST = 20;

        const colorMap = {
            "Living": "#FFCC00", "Kitchen": "#FFCC00", "Dining": "#FFCC00",
            "Circulation": "#FF4500", "Exterior": "#77DD77",
            "Bedroom": "#D4E5FF", "Office": "#FFB3B3"
        };

        const legendDiv = document.getElementById('legend');
        Object.entries(colorMap).forEach(([name, color]) => {
            legendDiv.innerHTML += `<div class="legend-item"><div class="swatch" style="background:${color}"></div>${name}</div>`;
        });

        function addRoom() {
            const name = document.getElementById('rName').value;
            const size = Math.sqrt(parseFloat(document.getElementById('rSqm').value)) * scale;
            const id = 'room-' + Date.now();
            const color = colorMap[name] || '#E0E0E0';
            const offset = rooms.length * 30;
            
            // Default dimensions
            let w = size;
            let h = size;

            // Apply Rectangle default for Circulation
            if (name === 'Circulation') {
                w = size * 1.5;
                h = size * 0.75;
            }
            
            const box = document.createElement('div');
            box.className = 'room-box';
            box.id = id;
            box.style.width = w + 'px';
            box.style.height = h + 'px';
            box.style.left = (50 + offset) + 'px'; 
            box.style.top = (50 + offset) + 'px';
            box.style.backgroundColor = color;
            box.innerHTML = `<div>${name} <span class="delete-btn" onclick="deleteRoom('${id}')">X</span></div><span class="dims"></span>`;
            
            new ResizeObserver(e => {
                const b = e[0].target;
                const w = (b.offsetWidth/scale).toFixed(0);
                const h = (b.offsetHeight/scale).toFixed(0);
                const area = (w * h);
                b.querySelector('.dims').innerText = `${w}m x ${h}m | ${area}sqm`;
                renderLines();
            }).observe(box);

            box.onmousedown = startDrag;
            document.getElementById('canvas').appendChild(box);
            rooms.push({ id, name });
            updateSelects();
        }

        function deleteRoom(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
            rooms = rooms.filter(r => r.id !== id);
            adjacencies = adjacencies.filter(a => a.a !== id && a.b !== id);
            updateSelects();
            renderLines();
        }

        function updateSelects() {
            const sels = [document.getElementById('roomA'), document.getElementById('roomB')];
            sels.forEach(s => {
                s.innerHTML = '';
                rooms.forEach(r => {
                    let opt = document.createElement('option');
                    opt.value = r.id; opt.innerText = r.name;
                    s.appendChild(opt);
                });
            });
        }

        function addAdjacency() {
            adjacencies.push({ a: document.getElementById('roomA').value, b: document.getElementById('roomB').value });
            renderLines();
        }

        function renderLines() {
            const svg = document.getElementById('svgLayer');
            svg.innerHTML = '';
            adjacencies.forEach(adj => {
                const elA = document.getElementById(adj.a);
                const elB = document.getElementById(adj.b);
                if (!elA || !elB) return;
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", elA.offsetLeft + elA.offsetWidth/2);
                line.setAttribute("y1", elA.offsetTop + elA.offsetHeight/2);
                line.setAttribute("x2", elB.offsetLeft + elB.offsetWidth/2);
                line.setAttribute("y2", elB.offsetTop + elB.offsetHeight/2);
                line.setAttribute("class", "line");
                svg.appendChild(line);
            });
        }

        function startDrag(e) {
            if (e.target.classList.contains('delete-btn')) return;
            let el = e.target.closest('.room-box');
            let shiftX = e.clientX - el.getBoundingClientRect().left;
            let shiftY = e.clientY - el.getBoundingClientRect().top;
            const canvas = document.getElementById('canvas').getBoundingClientRect();
            
            function move(e) {
                let left = e.clientX - shiftX - canvas.left;
                let top = e.clientY - shiftY - canvas.top;

                rooms.forEach(r => {
                    if (r.id === el.id) return;
                    let target = document.getElementById(r.id);
                    let tx = target.offsetLeft, ty = target.offsetTop;
                    let tw = target.offsetWidth, th = target.offsetHeight;

                    if (Math.abs(left - (tx + tw)) < SNAP_DIST) left = tx + tw;
                    else if (Math.abs(left + el.offsetWidth - tx) < SNAP_DIST) left = tx - el.offsetWidth;
                    
                    if (Math.abs(top - (ty + th)) < SNAP_DIST) top = ty + th;
                    else if (Math.abs(top + el.offsetHeight - ty) < SNAP_DIST) top = ty - el.offsetHeight;
                });

                el.style.left = left + 'px';
                el.style.top = top + 'px';
                renderLines();
            }
            
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', () => document.removeEventListener('mousemove', move));
        }
    </script>
</body>
</html>
